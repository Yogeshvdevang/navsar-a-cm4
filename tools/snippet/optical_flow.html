<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MTF-01 Optical Flow 3D View</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111824;
      --text: #e6edf3;
      --muted: #9bb0c4;
      --accent: #37c2ff;
      --accent2: #6dff92;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 10%, #152235 0%, #0b0f14 60%);
      color: var(--text);
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      overflow: hidden;
    }
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      z-index: 2;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 85%, transparent);
      border: 1px solid #1b2636;
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .value {
      font-size: 18px;
      font-weight: 600;
    }
    #status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: #0f1520;
      border: 1px solid #1b2636;
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    #legend {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      background: color-mix(in srgb, var(--panel) 85%, transparent);
      border: 1px solid #1b2636;
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
    }
    #legend label {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      display: inline-block;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #2a3648;
      border-radius: 999px;
      transition: background-color 0.2s ease;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      top: 3px;
      background-color: #cfd8e3;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }
    .toggle input:checked + .slider {
      background-color: #4b6b8a;
    }
    .toggle input:checked + .slider:before {
      transform: translateX(16px);
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    #graph {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="panel">
      <div class="title">Distance</div>
      <div class="value" id="dist">0.00 m</div>
      <div class="title" style="margin-top:8px;">Flow Velocity</div>
      <div class="value" id="flow">vx: 0  vy: 0</div>
    </div>
    <div class="panel">
      <div class="title">Speed</div>
      <div class="value" id="speed">x: 0.00 m/s  y: 0.00 m/s</div>
      <div class="title" style="margin-top:8px;">Quality</div>
      <div class="value" id="quality">0</div>
    </div>
  </div>

  <div id="status">CONNECTING...</div>
  <div id="legend"></div>
  <canvas id="graph"></canvas>

  <script>
    const distEl = document.getElementById("dist");
    const flowEl = document.getElementById("flow");
    const speedEl = document.getElementById("speed");
    const qualityEl = document.getElementById("quality");
    const statusEl = document.getElementById("status");

    const legend = document.getElementById("legend");
    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");

    const STREAMS = [
      { key: "height_m", label: "Height (m)", color: "#37c2ff" },
      { key: "flow_vx", label: "Flow vx", color: "#6dff92" },
      { key: "flow_vy", label: "Flow vy", color: "#ff8a5c" },
      { key: "speed_x", label: "Speed x (m/s)", color: "#f7c948" },
      { key: "speed_y", label: "Speed y (m/s)", color: "#b084f3" },
      { key: "flow_quality", label: "Flow quality", color: "#ff4d6d" },
    ];

    const MAX_POINTS = 600;
    const series = STREAMS.map(s => ({ ...s, points: [], enabled: true }));

    legend.innerHTML = series.map((s, idx) => (
      `<label data-idx="${idx}">` +
        `<span class="dot" style="background:${s.color};"></span>` +
        `<span>${s.label}</span>` +
        `<span class="toggle">` +
          `<input type="checkbox" checked>` +
          `<span class="slider"></span>` +
        `</span>` +
      `</label>`
    )).join("");

    legend.querySelectorAll("label").forEach((label) => {
      const idx = Number(label.getAttribute("data-idx"));
      const checkbox = label.querySelector("input");
      checkbox.addEventListener("change", () => {
        series[idx].enabled = checkbox.checked;
      });
    });

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawGrid() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0b0f14";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "#182230";
      ctx.lineWidth = 1;
      const step = 50;
      for (let x = 0; x < w; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "#2a3a52";
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }

    function updateVisual(data) {
      series.forEach((s) => {
        const v = Number(data[s.key] ?? 0);
        s.points.push(v);
        if (s.points.length > MAX_POINTS) s.points.shift();
      });

      drawGrid();

      const w = window.innerWidth;
      const h = window.innerHeight;
      const pad = 40;
      const graphW = w - pad * 2;
      const graphH = h - pad * 2;

      series.forEach((s) => {
        if (!s.enabled) return;
        if (s.points.length < 2) return;
        const min = Math.min(...s.points);
        const max = Math.max(...s.points);
        const range = max - min || 1;

        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        s.points.forEach((v, i) => {
          const x = pad + (i / (MAX_POINTS - 1)) * graphW;
          const y = pad + (1 - (v - min) / range) * graphH;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      });

      const height = data.height_m || 0;
      const speedX = data.speed_x || 0;
      const speedY = data.speed_y || 0;

      distEl.textContent = `${height.toFixed(2)} m`;
      flowEl.textContent = `vx: ${data.flow_vx || 0}  vy: ${data.flow_vy || 0}`;
      speedEl.textContent = `x: ${speedX.toFixed(2)} m/s  y: ${speedY.toFixed(2)} m/s`;
      qualityEl.textContent = String(data.flow_quality || 0);
    }

    function connect() {
      const es = new EventSource("/stream");
      statusEl.textContent = "CONNECTING...";

      es.onmessage = (evt) => {
        statusEl.textContent = "LIVE";
        statusEl.style.color = "#6dff92";
        try {
          const data = JSON.parse(evt.data);
          updateVisual(data);
        } catch (err) {
          console.error(err);
        }
      };

      es.onerror = () => {
        statusEl.textContent = "RECONNECTING...";
        statusEl.style.color = "#ffb454";
        es.close();
        setTimeout(connect, 1000);
      };
    }

    window.addEventListener("resize", resize);
    resize();
    drawGrid();
    connect();
  </script>
</body>
</html>
